<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PayLynk prototype — sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Sora:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Manrope, system-ui, -apple-system, Segoe UI, sans-serif;
      background: #f8f8f8;
      color: #2d2f2f;
    }
    .wrap {
      width: 100%;
      max-width: 420px;
      margin: 0 16px;
      padding: 28px 24px;
      border-radius: 8px;
      border: 1px solid #eeeeee;
      background: #fff;
      box-shadow: 0 0 6px rgb(0 0 0 / 9%);
      box-sizing: border-box;
    }
    h1 {
      margin: 0 0 8px;
      font-family: Sora, Manrope, sans-serif;
      font-size: 20px;
      font-weight: 600;
      line-height: normal;
    }
    p {
      margin: 0 0 20px;
      font-size: 14px;
      font-weight: 400;
      line-height: 20px;
      color: #797a7b;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 14px;
      font-family: inherit;
      font-size: 14px;
      border: 1px solid #dbdbdc;
      border-radius: 8px;
    }
    input:focus {
      outline: 2px solid #336aff;
      outline-offset: 0;
    }
    button {
      width: 100%;
      margin-top: 12px;
      padding: 12px 14px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 700;
      border: 0;
      border-radius: 12px;
      cursor: pointer;
      background: #3f78ff;
      color: #fff;
    }
    button:hover {
      filter: brightness(1.03);
    }
    .err {
      margin-top: 12px;
      min-height: 18px;
      font-size: 13px;
      color: #b00020;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Protected prototype</h1>
    <p>Enter the demo password to open the PayLynk prototype.</p>

    <form id="form">
      <input id="pw" type="password" autocomplete="current-password" placeholder="Password" aria-label="Password" required />
      <button type="submit">Continue</button>
      <div class="err" id="err" role="alert"></div>
    </form>
  </div>

  <script src="auth-config.js"></script>
  <script src="auth-core.js"></script>
  <script src="auth-login.js"></script>
</body>
</html>
