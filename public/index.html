<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>XREX PayLynk - Set up payment method</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Sora:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css?v=25" />
</head>
<body class="setup-page" data-prototype-context="payment-setup">
  <main class="setup-shell" aria-labelledby="setup-title">
    <section class="setup-hero" aria-label="XREX Pay">
      <img class="setup-hero__image" src="assets/setup-hero.jpg" alt="" />
      <img class="setup-hero__logo" src="assets/logo-xrex-pay-white.svg" alt="XREX Pay" />
    </section>

    <section class="setup-panel">
      <div class="setup-panel__body">
        <div class="setup-panel__content">
          <header class="setup-header">
            <div class="setup-steps" aria-label="Step 2 of 3">
              <span class="setup-steps__track setup-steps__track--done"></span>
              <span class="setup-steps__track"></span>
              <span class="setup-steps__item setup-steps__item--done">1</span>
              <span class="setup-steps__item setup-steps__item--current">2</span>
              <span class="setup-steps__item">3</span>
            </div>
            <h1 id="setup-title">Set up payment method</h1>
          </header>

          <div class="setup-options" aria-label="Payment methods">
            <a class="setup-option" href="setup-wallet.html">
              <img class="setup-option__image" src="assets/setup-stablecoin.png" alt="" />
              <span class="setup-option__content">
                <span class="setup-option__eyebrow">USDT, USDC</span>
                <span class="setup-option__title">Stablecoin wallet</span>
                <span class="setup-option__description">Create your self-custodial wallet for easy Auto-debit payments using USD stablecoins.</span>
                <span class="setup-option__action">
                  <img src="assets/icon-add-blue.svg" alt="" />
                  <span>Set up stablecoin payments</span>
                </span>
              </span>
            </a>

            <button class="setup-option" type="button">
              <img class="setup-option__image" src="assets/setup-swift.png" alt="" />
              <span class="setup-option__content">
                <span class="setup-option__eyebrow">USD</span>
                <span class="setup-option__title">SWIFT transfer</span>
                <span class="setup-option__description">Whitelist your USD bank account to streamline and speed up future cross-border payments.</span>
                <span class="setup-option__action">
                  <img src="assets/icon-add-blue.svg" alt="" />
                  <span>Whitelist bank account</span>
                </span>
              </span>
            </button>
          </div>

          <div class="setup-actions">
            <button class="setup-button setup-button--secondary" type="button">Back</button>
            <button class="setup-button setup-button--primary" type="button" disabled>Next</button>
          </div>
        </div>
      </div>

      <footer class="setup-footer">
        <p>© XREX Pay Limited 2026</p>
        <nav class="setup-footer__nav" aria-label="Footer">
          <!-- <a class="setup-footer__link setup-footer__link--desktop-only" href="#">Support</a>
          <span class="setup-footer__sep setup-footer__link--desktop-only" aria-hidden="true">|</span> -->
          <a class="setup-footer__link setup-footer__link--desktop-only" href="#">Terms of Use</a>
          <!-- <span class="setup-footer__sep setup-footer__link--desktop-only" aria-hidden="true">|</span>
          <a class="setup-footer__link setup-footer__link--desktop-only" href="#">Privacy Policy</a> -->
        </nav>
      </footer>
    </section>
  </main>

  <div class="build-badge" role="note" aria-label="Prototype state controls">
    <button class="build-badge__header" type="button" aria-expanded="true" aria-controls="prototypeStatesBody">
      <span class="build-badge__title">Prototype controls</span>
      <span class="build-badge__chevron" aria-hidden="true">
        <img class="build-badge__chevron-icon" src="assets/icon_back.svg" alt="" />
        <img class="build-badge__chevron-icon build-badge__chevron-icon--collapsed" src="assets/icon_prototypecontrols.svg" alt="" />
      </span>
    </button>
    <div class="build-badge__body" id="prototypeStatesBody">
      <button class="build-badge__reset" type="button" data-prototype-reset>Reset states</button>

      <div class="build-badge__checkbox-stack">
        <div class="build-badge__section-row">
          <label class="build-badge__checkbox">
            <input type="checkbox" data-prototype-empty aria-label="Empty" />
            <span>Empty</span>
          </label>
        </div>
      </div>

      <div class="build-badge__section-row">
        <div class="build-badge__section-title">Logged in</div>
        <div class="build-badge__checkbox-group">
          <select class="build-badge__select" data-prototype-logged-in aria-label="Logged in">
            <option value="false" selected>False</option>
            <option value="true">True</option>
          </select>
        </div>
      </div>

      <div class="build-badge__group" data-state-group="setupProgress">
        <div class="build-badge__group-label">Setup progress</div>
        <div class="build-badge__state">
          <button type="button" class="build-badge__state-btn" data-state-action="down" aria-label="Previous setup progress">−</button>
          <span class="build-badge__state-value" data-state-value></span>
          <button type="button" class="build-badge__state-btn" data-state-action="up" aria-label="Next setup progress">+</button>
          <span class="build-badge__state-name" data-state-name></span>
        </div>
      </div>
    </div>
  </div>

  <script defer src="js/prototype-state.js"></script>
</body>
</html>
